<div class="container-fluid vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="row w-100">
        <div class="col-md-6 col-lg-4 mx-auto">
            <div class="card shadow">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-primary">Login</h2>
                        <p class="text-muted">Entre com suas credenciais</p>
                    </div>

                    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" [(ngModel)]="loginData.email" #email="ngModel" required email placeholder="Digite seu email">
                            <div *ngIf="email.invalid && email.touched" class="text-danger small">
                                <!-- <div *ngIf="email.errors?.['required']">Email é obrigatório</div>
                                <div *ngIf="email.errors?.['email']">Digite um email válido</div> -->
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="password" name="password" [(ngModel)]="loginData.password" #password="ngModel" required minlength="5" placeholder="Digite sua senha">
                            <div *ngIf="password.invalid && password.touched" class="text-danger small">
                                <!-- <div *ngIf="password.errors?.['required']">Senha é obrigatória</div>
                                <div *ngIf="password.errors?.['minlength']">Senha deve ter pelo menos 5 caracteres</div> -->
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="button" class="btn btn-primary btn-lg" [disabled]="isLoading" (click)="onSubmit()">
                                <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status"></span>
                                {{ isLoading ? 'Entrando...' : 'Entrar' }}
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <small class="text-muted">
                            Não tem uma conta? 
                            <a href="#" class="text-decoration-none">Cadastre-se</a>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
