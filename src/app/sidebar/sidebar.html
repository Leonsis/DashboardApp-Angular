<nav class="sidebar" [class.collapsed]="isCollapsed">
  <div class="sidebar-header">
    <h2 class="sidebar-title" *ngIf="!isCollapsed">Dashboard</h2>
    <button class="toggle-btn" (click)="toggleSidebar()">
      <i class="fas fa-bars"></i>
    </button>
  </div>
  
  <!-- Barra de Pesquisa Mobile -->
  <div class="sidebar-search-mobile">
    <div class="search-container-mobile">
      <input 
        type="text" 
        [(ngModel)]="searchQuery" 
        (keyup.enter)="onSearch()"
        placeholder="Pesquisar..."
        class="search-input-mobile"
      >
      <button (click)="onSearch()" class="search-btn-mobile">
        <i class="fas fa-search"></i>
      </button>
    </div>
  </div>
  <div class="menu-title">
    <h3>Menu</h3>
  </div>
  <ul class="sidebar-menu">
    <li *ngFor="let item of menuItems" class="menu-item">
      <a href="#" class="menu-link">
        <i [class]="item.icon"></i>
        <span *ngIf="!isCollapsed">{{ item.name }}</span>
      </a>
    </li>
  </ul>
  <div class="menu-title">
    <h3>Configurações Da Conta</h3>
  </div>
</nav>
