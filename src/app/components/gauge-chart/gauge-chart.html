<div class="chart-container">
  <div class="chart-header">
    <h3 class="chart-title">{{ title }}</h3>
  </div>
  
  <div class="chart-body">
    <div class="gauge-chart">
      <div class="gauge-chart-inner">
        <div class="gauge-chart-value">{{ data.current }}%</div>
        <div class="gauge-chart-label">{{ data.label }}</div>
        
        <div class="gauge-progress-container">
          <div class="gauge-progress">
            <div class="gauge-progress-fill" [style.width.%]="data.percentage"></div>
          </div>
          <div class="gauge-progress-labels">
            <span class="progress-start">0%</span>
            <span class="progress-end">100%</span>
          </div>
        </div>
        
        <div class="gauge-chart-target">
          <i class="fas fa-target"></i>
          <span>Meta: {{ data.target }}%</span>
        </div>
        
        <div class="gauge-chart-status" [class]="getStatusClass()">
          <i [class]="getStatusIcon()"></i>
          <span>{{ getStatusText() }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
