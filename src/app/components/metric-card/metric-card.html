<div class="metric-card" [class]="'metric-card-' + color">
  <div class="metric-card-header">
    <div class="metric-card-icon">
      <i [class]="icon"></i>
    </div>
    <div class="metric-card-title">{{ title }}</div>
  </div>
  
  <div class="metric-card-body">
    <div class="metric-card-value">{{ value }}</div>
  </div>
</div>
